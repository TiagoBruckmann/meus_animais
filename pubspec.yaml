name: meus_pets
description: Tome nota dos cuidados especiais que seu pet precisa!

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.22.6+1

environment:
  sdk: ">=2.7.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  firebase_performance: ^0.5.0+1
  flutter_secure_storage: ^3.3.5
  font_awesome_flutter: ^8.12.0
  firebase_crashlytics: ^0.4.0+1
  flutter_masked_text: ^0.8.0
  firebase_analytics: ^7.0.1
  cloud_firestore: ^0.16.0+1
  shimmer_animation: ^1.0.0
  firebase_storage: ^7.0.0
  connectivity_plus: ^0.8.1
  cupertino_icons: ^1.0.0
  image_picker: ^0.6.7+22
  firebase_auth: ^0.20.1
  flutter_mobx: ^1.1.0+2
  google_nav_bar: ^4.0.2
  firebase_core: ^0.7.0
  find_dropdown: ^0.2.3
  flutter_i18n: ^0.21.1
  url_launcher: ^5.7.10
  injectable: ^1.1.2
  image_crop: ^0.3.4
  provider: ^4.3.3
  get_it: ^5.0.6
  mobx: ^1.2.1+4
  intl: ^0.16.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_native_splash: ^0.3.2
  injectable_generator: ^1.1.2
  build_runner: ^1.11.0
  mobx_codegen: ^1.1.2
  test: ^1.15.7

# configuracao da splash
flutter_native_splash:
  color: "#363435"
  image: assets/img/loading.jpg
  android: true
  ios: true
  fullscreen: true

# The following section is specific to Flutter.
flutter:

  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/languages/
    - assets/img/

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages